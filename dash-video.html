<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VJS v10 — DASH Video</title>
    <link id="skin-css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@videojs/html@10.0.0-beta.9/dist/default/define/video/skin.css" />
    <style>
      body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; background: #111; color: #fff; }
      header { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; background: #1a1a1a; }
      header a { color: #aaa; text-decoration: none; font-size: 0.9rem; }
      header a:hover { color: #fff; }
      h1 { margin: 0; font-size: 1.1rem; flex: 1; }
      .skin-toggle { display: flex; gap: 0.5rem; }
      .skin-toggle button {
        padding: 0.3rem 0.75rem;
        border: 1px solid #444;
        background: transparent;
        color: #ccc;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .skin-toggle button.active { background: #0066cc; border-color: #0066cc; color: #fff; }
      main { display: flex; justify-content: center; align-items: center; padding: 2rem 1rem; }
      #player-root { width: 100%; max-width: 960px; }
    </style>
    <script type="module">
      import 'https://esm.sh/@videojs/html@10.0.0-beta.9/video/player';
      import 'https://esm.sh/@videojs/html@10.0.0-beta.9/media/dash-video';
      import 'https://esm.sh/@videojs/html@10.0.0-beta.9/video/skin';
      import 'https://esm.sh/@videojs/html@10.0.0-beta.9/video/minimal-skin';

      const SRC = 'https://dash.akamaized.net/akamai/bbb_30fps/bbb_30fps.mpd';
      const CSS_BASE = 'https://cdn.jsdelivr.net/npm/@videojs/html@10.0.0-beta.9/dist/default/define/video/';
      let currentSkin = 'default';

      function render() {
        const tag = currentSkin === 'default' ? 'video-skin' : 'video-minimal-skin';
        document.getElementById('player-root').innerHTML = `
          <video-player>
            <${tag} class="w-full aspect-video">
              <dash-video slot="media" src="${SRC}" playsinline></dash-video>
            </${tag}>
          </video-player>
        `;
        document.getElementById('skin-css').href = CSS_BASE + (currentSkin === 'default' ? 'skin.css' : 'minimal-skin.css');
        document.querySelectorAll('.skin-toggle button').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.skin === currentSkin);
        });
      }

      document.querySelectorAll('.skin-toggle button').forEach(btn => {
        btn.addEventListener('click', () => { currentSkin = btn.dataset.skin; render(); });
      });

      render();
    </script>
  </head>
  <body>
    <header>
      <a href="index.html">← Back</a>
      <h1>DASH Video <small style="color:#888;font-weight:normal">(dash-video + dash.js)</small></h1>
      <div class="skin-toggle">
        <button data-skin="default" class="active">Default</button>
        <button data-skin="minimal">Minimal</button>
      </div>
    </header>
    <main>
      <div id="player-root"></div>
    </main>
  </body>
</html>
